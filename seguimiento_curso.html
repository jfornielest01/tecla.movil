<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seguimiento Profesor</title>
    <style>
        :root {
            --naranja-claro: #fff5ed;
            --borde-suave: #f0e4d7;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff; overflow-x: hidden; }
        
        /* HEADER */
        .header { 
            width: 100%; padding: 15px; background: var(--naranja-claro); color: #444; 
            display: flex; align-items: center; justify-content: space-between; 
            box-sizing: border-box; border-bottom: 1px solid var(--borde-suave);
        }

        .btn-menu { 
            background: #fff; color: #000; border: 1px solid #ddd; 
            padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--naranja-claro); transition: 0.3s; z-index: 1000;
            padding-top: 20px; box-sizing: border-box; border-right: 1px solid var(--borde-suave);
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: block; padding: 15px 25px; color: #555; text-decoration: none;
            border-bottom: 1px solid var(--borde-suave); font-size: 15px;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* CONTENIDO MENÚ ACCIONES (ESTILO HIJO-ITEM) */
        .container { width: 90%; max-width: 500px; margin: 30px auto; }
        h2 { text-align: center; color: #333; font-weight: 300; margin-bottom: 30px; }
        
        .accion-item {
            display: flex; align-items: center; background: #fff;
            padding: 20px; border-radius: 12px; margin-bottom: 15px;
            border: 1px solid var(--borde-suave); cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .accion-item:active { transform: scale(0.98); }
        .accion-item:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .accion-icon { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 15px; border-radius: 50%; background: var(--naranja-claro); }
        .accion-info { flex-grow: 1; }
        .accion-nombre { font-weight: bold; font-size: 16px; color: #222; }
        .accion-desc { font-size: 12px; color: #888; }
        
        .arrow { color: #ccc; font-size: 20px; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <div id="menu-options"></div>
        <a href="#" style="color: #d32f2f;" id="btn-logout">Cerrar Sesión</a>
    </div>
    <div id="overlay" class="overlay"></div>

    <div class="header">
        <button class="btn-menu" id="open-menu">MENÚ</button>
        <span style="font-weight: bold;">GESTIÓN DOCENTE</span>
        <div style="width: 60px;"></div>
    </div>

    <div class="container">
        <h2 id="profesor-nombre">Cargando...</h2>

seccion mantenimiento error 8928382347324 COMUNIQUE AL CAU

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAWM6KyEYGozVP6JfY_EpGv6kGxjWzzPk",
            authDomain: "studio-4610881504-8afcf.firebaseapp.com",
            projectId: "studio-4610881504-8afcf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const uid = new URLSearchParams(window.location.search).get('uid');
        if (!uid) window.location.href = "index.html";

        // Configurar redirecciones
        document.getElementById('btn-positivos').onclick = () => window.location.href = `comp.html?uid=${uid}`;
        document.getElementById('btn-otros').onclick = () => window.location.href = `otros.html?uid=${uid}`;

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuOptions = document.getElementById('menu-options');

        document.getElementById('open-menu').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
        overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };

        // CARGAR DATOS PARA EL SIDEBAR Y NOMBRE
        onSnapshot(doc(db, "users", uid), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('profesor-nombre').innerText = "Prof. " + (data.displayName || "Usuario");
                
                const roles = data.roles || [];
                let menuHtml = "";
                if (roles.includes("Responsable Legal")) menuHtml += `<a href="seguimiento_hijo.html?uid=${uid}">Seguimiento de mi hijo</a>`;                menuHtml += `<a href="mensajeria.html?uid=${uid}">Mensajería</a>`;
                menuOptions.innerHTML = menuHtml;
            }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>

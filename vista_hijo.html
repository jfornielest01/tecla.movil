<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expediente Alumno</title>
    <style>
        :root { --naranja-claro: #fff5ed; --borde-suave: #f0e4d7; --naranja-fuerte: #f60; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff; color: #333; }
        
        .header { width: 100%; padding: 15px; background: var(--naranja-claro); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde-suave); box-sizing: border-box; position: sticky; top: 0; z-index: 10; }
        .btn-back { background: #fff; border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .perfil-hijo { text-align: center; padding: 20px; background: #fafafa; border-bottom: 1px solid #eee; }
        .hijo-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #333; margin-bottom: 8px; }

        .selector-section { padding: 15px; background: #fff; text-align: center; }
        select { width: 100%; max-width: 400px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; background: var(--naranja-claro); outline: none; }

        .container { padding: 0 20px 20px 20px; }
        h3 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 25px; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        /* ESTILOS NOTAS */
        .grade-card { background: #fff; border: 1px solid var(--borde-suave); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grade-value { font-size: 22px; font-weight: bold; color: var(--naranja-fuerte); background: var(--naranja-claro); padding: 5px 12px; border-radius: 8px; }

        /* ESTILOS REMARKS (Positivos/Negativos) */
        .remark-card { padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; border: 1px solid #eee; }
        .remark-pos { border-left: 5px solid #4caf50; background: #f1f8e9; }
        .remark-neg { border-left: 5px solid #f44336; background: #ffebee; }
        .remark-icon { font-size: 20px; }

        /* ESTILOS ASISTENCIA */
        .absence-card { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ccc; }
        .abs-status { font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; min-width: 80px; text-align: center; }
        .status-inj { border-left-color: #d32f2f !important; }
        .label-inj { background: #ffebee; color: #c62828; }
        .status-ret { border-left-color: #fbc02d !important; }
        .label-ret { background: #fff9c4; color: #f57f17; }
        .status-just { border-left-color: #388e3c !important; }
        .label-just { background: #e8f5e9; color: #2e7d32; }

        /* FORMULARIO Y MODAL */
        .form-box { background: var(--naranja-claro); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .input-app { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; background: #000; color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fff; width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; text-align: center; }
        .msg { text-align: center; color: #999; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <h4 id="modal-title" style="margin-top:0;">Confirmar</h4>
            <div id="modal-body"><input type="text" id="modal-input" class="input-app"></div>
            <div class="modal-btns" style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#eee;">Cancelar</button>
                <button id="modal-confirm-btn" style="flex:1; padding:12px; border-radius:8px; border:none; background:#000; color:#fff;">Aceptar</button>
            </div>
        </div>
    </div>

    <div class="header">
        <button class="btn-back" id="btn-back">VOLVER</button>
        <span style="font-weight: bold;">EXPEDIENTE</span>
        <div style="width: 45px;"></div>
    </div>

    <div class="perfil-hijo">
        <img src="" id="hijo-img" style="display:none" class="hijo-img">
        <div id="hijo-name" style="font-weight:bold;">Cargando...</div>
    </div>

    <div class="selector-section">
        <select id="select-year"><option value="">Seleccione Año Académico</option></select>
    </div>

    <div class="container">
        <h3>Observaciones del Profesor</h3>
        <div id="lista-remarks"><div class="msg">Selecciona un año académico...</div></div>

        <h3>Calificaciones</h3>
        <div id="lista-notas"></div>

        <h3>Asistencia</h3>
        <div id="lista-asistencia"></div>

        <h3>Justificar Ausencia</h3>
        <div class="form-box">
            <input type="date" id="abs-date" class="input-app">
            <input type="text" id="abs-reason" placeholder="Motivo de la falta..." class="input-app">
            <button id="btn-send-abs" class="btn-main">ENVIAR</button>
        </div>

        <h3>Mis Justificantes</h3>
        <div id="lista-faltas"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, onSnapshot, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAWM6KyEYGozVP6JfY_EpGv6kGxjWzzPk",
            authDomain: "studio-4610881504-8afcf.firebaseapp.com",
            projectId: "studio-4610881504-8afcf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const hijoUid = params.get('uid');
        const pUid = params.get('puid') || "USER_ID";

        if (!hijoUid) window.location.href = "index.html";
        document.getElementById('btn-back').onclick = () => window.history.back();

        // 1. Perfil
        onSnapshot(doc(db, "users", hijoUid), (s) => {
            if(s.exists()){
                const d = s.data();
                document.getElementById('hijo-name').innerText = d.displayName;
                if(d.photoURL) {
                    const img = document.getElementById('hijo-img');
                    img.src = d.photoURL; img.style.display = 'inline-block';
                }
            }
        });

        // 2. Años Académicos
        const selectY = document.getElementById('select-year');
        getDocs(collection(db, "academicYears")).then(snap => {
            snap.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id; opt.innerText = d.data().name;
                selectY.appendChild(opt);
            });
        });

        selectY.onchange = (e) => {
            if(!e.target.value) return;
            loadData(e.target.value);
        };

        function loadData(yearId) {
            // CARGAR REMARKS (Positivos/Negativos)
            onSnapshot(query(collection(db, "remarks"), where("studentId", "==", hijoUid), where("academicYearId", "==", yearId)), snap => {
                const cont = document.getElementById('lista-remarks');
                cont.innerHTML = snap.empty ? "<div class='msg'>No hay observaciones este año.</div>" : "";
                snap.forEach(doc => {
                    const r = doc.data();
                    const isPos = r.type === "positive";
                    const cardClass = isPos ? "remark-pos" : "remark-neg";
                    const icon = isPos ? "P" : "N";
                    
                    cont.innerHTML += `
                        <div class="remark-card ${cardClass}">
                            <span class="remark-icon">${icon}</span>
                            <div>
                                <div style="font-weight:bold; font-size:14px;">${r.courseName}</div>
                                <div style="font-size:12px; color:#555; margin-top:2px;">${r.date} • ${r.time}</div>
                                <div style="font-size:11px; color:#888; text-transform:uppercase;">${r.type === 'negative' ? 'Aspecto a mejorar' : 'Felicidades'}</div>
                            </div>
                        </div>`;
                });
            });

            // CARGAR NOTAS
            getDocs(query(collection(db, "evaluationPeriods"), where("isPublished", "==", true))).then(pubSnap => {
                const pubIds = pubSnap.docs.map(d => d.id);
                onSnapshot(query(collection(db, "grades"), where("studentId", "==", hijoUid), where("academicYearId", "==", yearId)), snap => {
                    const cont = document.getElementById('lista-notas');
                    cont.innerHTML = snap.empty ? "<div class='msg'>No hay notas publicadas.</div>" : "";
                    snap.forEach(doc => {
                        const g = doc.data();
                        if(pubIds.includes(g.evaluationPeriodId)) {
                            cont.innerHTML += `<div class="grade-card"><div><b>${g.courseName}</b><br><small>${g.evaluationPeriodId}</small></div><div class="grade-value">${g.grade}</div></div>`;
                        }
                    });
                });
            });

            // CARGAR ASISTENCIA (absences)
            onSnapshot(query(collection(db, "absences"), where("studentId", "==", hijoUid), where("academicYearId", "==", yearId)), snap => {
                const cont = document.getElementById('lista-asistencia');
                cont.innerHTML = snap.empty ? "<div class='msg'>Sin faltas registradas.</div>" : "";
                snap.forEach(doc => {
                    const a = doc.data();
                    let sClass = 'status-inj', sLab = 'label-inj', sText = 'Injustificada';
                    if(a.status === 'ret') { sClass = 'status-ret'; sLab = 'label-ret'; sText = 'Retraso'; }
                    if(a.status === 'just') { sClass = 'status-just'; sLab = 'label-just'; sText = 'Justificada'; }
                    
                    cont.innerHTML += `
                        <div class="absence-card ${sClass}">
                            <div><b>${a.courseName}</b><br><small>${a.date} • ${a.time}</small></div>
                            <div class="abs-status ${sLab}">${sText}</div>
                        </div>`;
                });
            });

            // CARGAR HISTORIAL PADRE
            onSnapshot(query(collection(db, "absenceNotifications"), where("studentId", "==", hijoUid), where("academicYearId", "==", yearId)), snap => {
                const list = document.getElementById('lista-faltas');
                list.innerHTML = "";
                snap.forEach(d => {
                    const f = d.data();
                    list.innerHTML += `<div class="abs-card"><b>${f.date}</b><br>${f.reason}
                        <div style="margin-top:10px;"><button onclick="openDeleteModal('${d.id}')" style="color:red; background:none; border:none; padding:0; font-weight:bold; cursor:pointer;">ELIMINAR</button></div>
                    </div>`;
                });
            });
        }

        // 3. Enviar Justificación
        document.getElementById('btn-send-abs').onclick = async () => {
            const date = document.getElementById('abs-date').value;
            const reason = document.getElementById('abs-reason').value;
            if(!date || !reason || !selectY.value) return;
            const id = `${hijoUid}-${date}`;
            await setDoc(doc(db, "absenceNotifications", id), {
                id, academicYearId: selectY.value, date, reason, studentId: hijoUid,
                studentName: document.getElementById('hijo-name').innerText, guardianId: pUid, notifiedAt: serverTimestamp()
            });
            document.getElementById('abs-reason').value = "";
        };

        // LÓGICA MODAL
        const modal = document.getElementById('custom-modal');
        window.closeModal = () => modal.style.display = 'none';
        window.openDeleteModal = (id) => {
            document.getElementById('modal-title').innerText = "¿Eliminar justificante?";
            document.getElementById('modal-input').style.display = 'none';
            modal.style.display = 'flex';
            document.getElementById('modal-confirm-btn').onclick = async () => {
                await deleteDoc(doc(db, "absenceNotifications", id));
                closeModal();
            };
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mensajería TECLA</title>
    <style>
        :root { --naranja: #fff5ed; --borde: #f0e4d7; --texto: #444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff; color: var(--texto); overflow-x: hidden; }
        
        .header { 
            padding: 15px; background: var(--naranja); display: flex; 
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--borde);
            position: sticky; top: 0; z-index: 10;
        }
        .btn-back { background: #fff; border: 1px solid #ddd; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .tabs { display: flex; border-bottom: 1px solid var(--borde); background: #fff; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #999; transition: 0.3s; }
        .tab.active { color: #333; border-bottom: 3px solid #f0ad4e; background: var(--naranja); }

        .container { padding: 20px; max-width: 600px; margin: auto; box-sizing: border-box; }
        .hidden { display: none; }

        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: #666; }
        input, textarea, select { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: 1px solid var(--borde); box-sizing: border-box; font-size: 15px; outline: none;
        }
        select[multiple] { height: 150px; }
        .btn-enviar { 
            width: 100%; background: #4caf50; color: white; border: none; 
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .msg-card { 
            padding: 15px; border: 1px solid var(--borde); border-radius: 12px; 
            margin-bottom: 12px; background: #fff;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-back" onclick="window.history.back()">‹ Volver</button>
    <span style="font-weight: bold;">MENSAJERÍA</span>
    <div style="width: 50px;"></div>
</div>

<div class="tabs">
    <div class="tab active" id="tab-recibidos" onclick="showTab('recibidos')">RECIBIDOS</div>
    <div class="tab" id="tab-nuevo" onclick="showTab('nuevo')">NUEVO MENSAJE</div>
</div>

<div class="container" id="view-recibidos">
    <div id="lista-mensajes">Buscando mensajes...</div>
</div>

<div class="container hidden" id="view-nuevo">
    <select id="destinatarios" multiple></select>
    <input type="text" id="asunto" placeholder="Asunto">
    <textarea id="contenido"></textarea>
    <input type="text" id="adjunto">
    <button id="btn-send">ENVIAR</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, getDocs, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAWM6KyEYGozVP6JfY_EpGv6kGxjWzzPk",
    authDomain: "studio-4610881504-8afcf.firebaseapp.com",
    projectId: "studio-4610881504-8afcf",
    messagingSenderId: "330090444658",
    appId: "1:330090444658:web:0ab0c98f2ab0235af74feb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messaging = getMessaging(app);

const myUid = new URLSearchParams(window.location.search).get('uid');
const vapidKey = 'BMuyXKcNogFOCdszgt_9gQl9OIb34ihF8Poyn2rPUKSrVpR2-3nfAoLcrPETSxAfIXCqJdlocaQmE88P_c11tH4';


// 🔥 SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/firebase-messaging-sw.js');
}


// 🔥 NOTIFICACIONES
async function initNotifications() {
    const permission = await Notification.requestPermission();

    if (permission === "granted") {
        const token = await getToken(messaging, {
            vapidKey,
            serviceWorkerRegistration: await navigator.serviceWorker.ready
        });

        if (token) {
            await updateDoc(doc(db, "users", myUid), { fcmToken: token });
            console.log("TOKEN:", token);
        }
    }
}
initNotifications();


// 🔥 FOREGROUND PUSH
onMessage(messaging, (payload) => {
    new Notification(payload.notification.title, {
        body: payload.notification.body
    });
});


// --- RESTO TU APP IGUAL ---
window.showTab = (tab) => {
    document.getElementById('view-recibidos').classList.toggle('hidden', tab !== 'recibidos');
    document.getElementById('view-nuevo').classList.toggle('hidden', tab !== 'nuevo');
};

const qRec = query(collection(db, "mensajeriaGeneral"), where("enviadoHacia", "array-contains", myUid));
onSnapshot(qRec, (snap) => {
    const cont = document.getElementById('lista-mensajes');
    cont.innerHTML = "";

    snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = "msg-card";
        div.innerHTML = `<b>${d.asunto}</b><p>${d.contenido}</p>`;
        cont.appendChild(div);
    });
});

document.getElementById('btn-send').onclick = async () => {
    await addDoc(collection(db, "mensajeriaGeneral"), {
        remitenteId: myUid,
        enviadoHacia: [],
        asunto: document.getElementById('asunto').value,
        contenido: document.getElementById('contenido').value,
        timestamp: serverTimestamp()
    });
};
</script>

</body>
</html>
